name: Build and Attest LaTeX Document

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install minimal TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-base texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Compile LaTeX document
        run: |
          pdflatex -interaction=nonstopmode requete_philippe_savard.tex
          pdflatex -interaction=nonstopmode requete_philippe_savard.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: requete-philippe-savard-pdf
          path: requete_philippe_savard.pdf

      - name: Generate build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "requete_philippe_savard.pdf"

